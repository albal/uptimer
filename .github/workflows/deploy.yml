name: Deploy Uptimer

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Prepare Backend Static
        run: |
          mkdir -p backend/static
          cp -r frontend/dist/* backend/static/

      - name: Build Backend
        run: |
          cd backend
          GOOS=linux GOARCH=amd64 go build -o ../uptimer ./cmd/uptimer/main.go

      - name: Deploy to Debian 13
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "uptimer,backend/internal/database/migrations"
          target: "/opt/uptimer"
          strip_components: 0

      - name: Post-Deploy Steps
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Apply migrations (binary does this on start)
            # Restart service
            sudo systemctl daemon-reload
            sudo systemctl restart uptimer
            
            # Verify status
            systemctl is-active --quiet uptimer && echo "Uptimer is up!" || (journalctl -u uptimer -n 20 && exit 1)
